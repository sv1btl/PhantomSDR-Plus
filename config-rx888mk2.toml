[server]
port=9002 # Server port-everything you like
html_root="frontend/dist/" # HTML files to be hosted
otherusers=1 # Send where other users are listening, 0 to disable
threads=4

[websdr]
register_online=true # Enable directory registration updates
register_urls=[
  "https://sdr-list.xyz/api/update_websdr",
  "http://list.phantomsdr.fun/api/update_websdr",
  ] # One or more directory endpoints that accept the same JSON payload
name="ChangeThis CATsync PhantomSDR+" # Name that is shown on https://sdr-list.xyz
antenna="aChangeThis" # Antenna that is shown on https://sdr-list.xyz
grid_locator="ChangeThis" # 4 or 6 length Grid Locatlr shown on https://sdr-list.xyz and for the Distance of FT8 Signals
hostname="user.domain.com" # If you use ddns or something to host with a domain enter it here for https://sdr-list.xyzv

# In case you want to register to websdr.org, please uncomment and fill with your data
# [websdr.org]
# enabled     = true
# public_host = "yourIP"
# public_port = port
# qth         = "QTH Locator"
# description = "CallSign PhantomSDR+"
# email       = "mail@domain.com"
# ogo        = "logo.jpg" #located in frontend public. Use the same or change it

[limits]
audio=100
waterfall=100
events=100

[input]
sps=60000000 # Input Sample Rate
fft_size=8388608 # FFT bins alt. 1048576, 2097152, 4194304, 8388608 (default), 16777216, look at https://www.mymathtables.com/numbers/power-exponentiation/power-of-2.html
fft_threads=4
brightness_offset=-8 # Waterfall brightness offset. Reduce to negative if you see black regions in the waterfall # brightness_offset=-8 when -g 40 -a 0 -m low
frequency=0 # Baseband frequency
signal="real" # real or iq
accelerator="opencl" # Accelerator: none, cuda, opencl
#accelerator="none" # Accelerator: none, cuda, opencl
audio_sps=12000 # Audio Sample Rate
audio_compression="flac" # flac or opus
waterfall_size=1024
waterfall_compression="zstd" # zstd or av1
smeter_offset=5 # digital-only S-meter offset
analog_smeter_offset=5 # analog-only S-meter offset

[input.driver]
name="stdin" # Driver name
format="s16" # Sample format: u8, s8, u16, s16, u32, s32, f32, f64

[input.defaults]
frequency=7120000 # Default frequency to show user 7120000
modulation="LSB" # Default modulation
